spring:
  datasource:
    url: jdbc:mysql://localhost:3306/barberia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.barberia: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

barberia:
  services:
    sfumatura: 8
    taglio: 10
    taglio_barba: 15
    sfumatura_barba: 12
  products:
    cera: 10
    gel: 10
    spray: 12
